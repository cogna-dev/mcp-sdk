name: CI

on: [push, pull_request]
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Update MoonBit registry
        run: moon update

      - name: Check
        run: moon check

      - name: Format
        run: moon fmt --check

      - name: Build
        run: moon build

      - name: Test
        run: moon test

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Publish to mooncakes
        uses: cogna-dev/moonbit-actions/publish@v0.1.2
        with:
          token: ${{ secrets.MOONCAKES_TOKEN }}
